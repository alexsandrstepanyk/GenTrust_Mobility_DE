<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GenTrust Mobility - Моніторинг Системи</title>
    <link rel="stylesheet" href="style.css">
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎯 GenTrust Mobility</h1>
            <h2>Система Моніторингу Процесів</h2>
            <div class="timestamp">Оновлено: <span id="timestamp">--:--:--</span></div>
            
            <!-- Кнопки управління -->
            <div class="control-buttons">
                <button onclick="stopAllProcesses()" class="control-btn stop-all">
                    🛑 Зупинити ВСІ процеси
                </button>
                <button onclick="startAllProcesses()" class="control-btn start-all">
                    🚀 Запустити ВСІ сервіси
                </button>
                <button onclick="enableAutoStart()" class="control-btn auto-start">
                    ⚙️ Додати в автозапуск macOS
                </button>
                <button onclick="openInBrowser()" class="control-btn open-browser">
                    🌐 Відкрити Monitor в Safari
                </button>
            </div>
        </header>

        <!-- База даних -->
        <section class="section">
            <h3>🗄️ База Даних</h3>
            <div id="database-status" class="service-grid">
                <!-- Заповнюється динамічно -->
            </div>
        </section>

        <!-- Основні сервіси -->
        <section class="section">
            <h3>🚀 Основні Сервіси</h3>
            <div id="services-status" class="service-grid">
                <!-- Заповнюється динамічно -->
            </div>
        </section>

        <!-- Telegram боти -->
        <section class="section">
            <h3>🤖 Telegram Боти</h3>
            <div id="bots-status" class="bot-grid">
                <!-- Заповнюється динамічно -->
            </div>
        </section>

        <footer>
            <p>💡 Підключення: <span id="connection-status" class="status-online">Підключено</span></p>
            <p>🔄 Оновлення кожні 3 секунди</p>
        </footer>

        <!-- Вбудований термінал для логів -->
        <section class="section terminal-section">
            <h3>📋 Live Термінал - Логи в реальному часі</h3>
            <div class="terminal-controls">
                <select id="log-service" onchange="loadLogs()">
                    <option value="all">📊 Всі логи</option>
                    <option value="backend">🌐 Backend API</option>
                    <option value="admin">🔐 Admin Panel</option>
                    <option value="city-hall">🏛️ City-Hall</option>
                    <option value="expo-client">📱 Expo Client</option>
                    <option value="expo-school">🎓 Expo School</option>
                    <option value="monitor">🖥️ Monitor</option>
                </select>
                <button onclick="loadLogs()" class="terminal-btn">🔄 Оновити</button>
                <button onclick="toggleAutoRefresh()" class="terminal-btn" id="auto-refresh-btn">⏸️ Пауза</button>
                <button onclick="clearLogs()" class="terminal-btn">🗑️ Очистити</button>
            </div>
            <div class="terminal-window" id="terminal-window">
                <div class="terminal-header">
                    <span>📝 Live Logs</span>
                    <span id="terminal-status">● Live</span>
                </div>
                <pre id="terminal-content">Завантаження логів...</pre>
            </div>
        </section>
    </div>

    <script>
        const socket = io();
        
        // Підключення до сервера
        socket.on('connect', () => {
            document.getElementById('connection-status').textContent = 'Підключено';
            document.getElementById('connection-status').className = 'status-online';
        });

        socket.on('disconnect', () => {
            document.getElementById('connection-status').textContent = 'Від\'єднано';
            document.getElementById('connection-status').className = 'status-offline';
        });

        // Отримання оновлень статусу
        socket.on('status-update', (data) => {
            updateTimestamp(data.timestamp);
            updateDatabase(data.database);
            updateServices(data.services);
            updateBots(data.bots);
        });

        function updateTimestamp(timestamp) {
            const date = new Date(timestamp);
            document.getElementById('timestamp').textContent = date.toLocaleTimeString('uk-UA');
        }

        function updateDatabase(db) {
            const container = document.getElementById('database-status');
            
            const statusClass = db.status === 'online' ? 'online' : 
                               db.status === 'error' ? 'offline' : 'warning';
            
            container.innerHTML = `
                <div class="service-card ${statusClass}">
                    <div class="service-header">
                        <div class="service-icon">🗄️</div>
                        <div class="service-info">
                            <h4>SQLite Database</h4>
                            <p class="service-description">/prisma/dev.db</p>
                        </div>
                        <div class="status-indicator ${statusClass}"></div>
                    </div>
                    <div class="service-status">
                        <p>${db.message}</p>
                    </div>
                </div>
            `;
        }

        function updateServices(services) {
            const container = document.getElementById('services-status');

            container.innerHTML = services.map(service => {
                const statusClass = service.status === 'online' ? 'online' :
                                   service.status === 'error' ? 'warning' : 'offline';

                const hasLogs = service.logs && service.logs.trim() !== '(Лог порожній)';
                
                const hasCommands = service.commands ? `
                    <div class="commands-section">
                        <details class="commands">
                            <summary>💻 Команди запуску</summary>
                            <div class="command-blocks">
                                <div class="command-item">
                                    <div class="command-label">📂 Перейти в папку:</div>
                                    <code class="command-code">${service.commands.cd}</code>
                                </div>
                                <div class="command-item">
                                    <div class="command-label">🚀 Запустити:</div>
                                    <code class="command-code">${service.commands.start}</code>
                                </div>
                                <div class="command-item">
                                    <div class="command-label">🛑 Зупинити (якщо порт зайнятий):</div>
                                    <code class="command-code">${service.commands.kill}</code>
                                </div>
                                <div class="command-item">
                                    <div class="command-label">📋 Повна команда (копіювати):</div>
                                    <code class="command-code full-command">${service.commands.cd} && ${service.commands.start}</code>
                                </div>
                            </div>
                        </details>
                    </div>
                ` : '';

                return `
                    <div class="service-card ${statusClass}">
                        <div class="service-header">
                            <div class="service-icon">${service.icon}</div>
                            <div class="service-info">
                                <h4>${service.name}</h4>
                                <p class="service-description">Порт: ${service.port}</p>
                            </div>
                            <div class="status-indicator ${statusClass}"></div>
                        </div>
                        <div class="service-status">
                            <p><strong>${service.message}</strong></p>
                            <div class="service-details">
                                <span class="detail-item">
                                    Порт активний: ${service.portActive ? '✅' : '❌'}
                                </span>
                                <span class="detail-item">
                                    Health check: ${service.healthOk ? '✅' : '❌'}
                                </span>
                                ${service.metrics && service.metrics.pid ? `
                                <span class="detail-item">
                                    🧠 CPU: <strong>${service.metrics.cpu}</strong>
                                </span>
                                <span class="detail-item">
                                    💾 Memory: <strong>${service.metrics.memory}</strong>
                                </span>
                                ` : ''}
                            </div>
                        </div>
                        ${hasCommands}
                        ${hasLogs ? `
                            <details class="logs-section">
                                <summary>📋 Логи (останні 10 рядків)</summary>
                                <pre class="logs">${escapeHtml(service.logs)}</pre>
                            </details>
                        ` : ''}
                    </div>
                `;
            }).join('');
        }

        function updateBots(bots) {
            const container = document.getElementById('bots-status');
            
            container.innerHTML = bots.map(bot => {
                const statusClass = bot.status ? 'online' : 'offline';
                
                return `
                    <div class="bot-card ${statusClass}">
                        <div class="bot-icon">${bot.icon}</div>
                        <div class="status-indicator ${statusClass}"></div>
                        <h4>${bot.name}</h4>
                        <p>${bot.message}</p>
                    </div>
                `;
            }).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Функції для вбудованого терміналу
        let autoRefreshInterval = null;
        let isAutoRefresh = true;

        async function loadLogs() {
            const service = document.getElementById('log-service').value;
            const terminalContent = document.getElementById('terminal-content');
            
            try {
                const url = service === 'all' ? '/api/all-logs' : `/api/logs/${service}`;
                const response = await fetch(url);
                const data = await response.json();
                
                if (service === 'all') {
                    let output = '';
                    for (const [svc, logs] of Object.entries(data)) {
                        output += `\n${'='.repeat(60)}\n`;
                        output += `📋 ${svc.toUpperCase()} LOGS\n`;
                        output += `${'='.repeat(60)}\n`;
                        output += logs + '\n';
                    }
                    terminalContent.textContent = output;
                } else {
                    terminalContent.textContent = data.logs || 'Логів немає';
                }
                
                // Автопрокрутка вниз
                const terminalWindow = document.getElementById('terminal-window');
                terminalWindow.scrollTop = terminalWindow.scrollHeight;
            } catch (error) {
                terminalContent.textContent = '❌ Помилка завантаження логів: ' + error.message;
            }
        }

        function toggleAutoRefresh() {
            const btn = document.getElementById('auto-refresh-btn');
            const status = document.getElementById('terminal-status');
            
            if (isAutoRefresh) {
                clearInterval(autoRefreshInterval);
                btn.textContent = '▶️ Старт';
                status.textContent = '⏸️ Пауза';
                status.style.color = '#f59e0b';
                isAutoRefresh = false;
            } else {
                autoRefreshInterval = setInterval(loadLogs, 3000);
                btn.textContent = '⏸️ Пауза';
                status.textContent = '● Live';
                status.style.color = '#10b981';
                isAutoRefresh = true;
            }
        }

        function clearLogs() {
            document.getElementById('terminal-content').textContent = '';
        }

        // Автозавантаження логів при старті
        document.addEventListener('DOMContentLoaded', () => {
            loadLogs();
            autoRefreshInterval = setInterval(loadLogs, 3000);
        });

        // Функції для кнопок управління
        async function stopAllProcesses() {
            if (!confirm('⚠️ УВАГА! Це зупинить ВСІ процеси (Backend, Admin, City-Hall, Expo). Продовжити?')) {
                return;
            }
            
            try {
                const response = await fetch('/api/stop-all', { method: 'POST' });
                const data = await response.json();
                alert('🛑 ' + data.message);
                setTimeout(() => location.reload(), 2000);
            } catch (error) {
                alert('❌ Помилка: ' + error.message);
            }
        }

        async function startAllProcesses() {
            if (!confirm('🚀 Запустити ВСІ сервіси? Це може зайняти 30-60 секунд.')) {
                return;
            }
            
            try {
                const response = await fetch('/api/start-all', { method: 'POST' });
                const data = await response.json();
                alert('✅ ' + data.message + '\n\nСервіси запускаються... Відкрийте Monitor Dashboard через 30 секунд для перевірки статусу.');
            } catch (error) {
                alert('❌ Помилка: ' + error.message);
            }
        }

        async function enableAutoStart() {
            if (!confirm('⚙️ Додати Monitor Dashboard в автозапуск macOS?\n\nDashboard автоматично запускатиметься при вході в систему.')) {
                return;
            }
            
            try {
                const response = await fetch('/api/enable-auto-start', { method: 'POST' });
                const data = await response.json();
                
                if (data.success) {
                    alert('✅ ' + data.message + '\n\nMonitor Dashboard тепер запускається автоматично при вході в macOS!');
                } else {
                    alert('❌ ' + data.message);
                }
            } catch (error) {
                alert('❌ Помилка: ' + error.message);
            }
        }

        function openInBrowser() {
            const url = 'http://localhost:9000';
            window.open(url, '_blank');
        }
    </script>
</body>
</html>
